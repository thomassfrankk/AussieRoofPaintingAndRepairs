<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Requested | Aussie Roof Painting & Repairs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
    .success-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem;
      max-width: 500px;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      background: rgba(45,140,60,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem;
    }
    .success-card h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 1rem;
    }
    .success-card p {
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo-group">
    <a href="/"><img src="/images/logo.png" alt="Aussie Roof Painting & Repairs" class="logo-img" /></a>
  </div>
</nav>

<div class="success-page">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h1>Quote Requested!</h1>
    <p>Thank you for reaching out. We've received your details and will get back to you within 24 hours with a no-obligation quote.</p>
    <a href="/" class="btn-primary">Back to Home</a>
  </div>
</div>

</body>
</html>
